---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Configure Nginx reverse proxy
  template:
    src: default.conf.j2
    dest: /etc/nginx/sites-available/default
  notify: reload nginx

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes
